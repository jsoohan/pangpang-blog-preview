      <stop offset="0" stop-color="#fffdf9"/>
      <stop offset="1" stop-color="#f3f6f4"/>
    </linearGradient>
    <marker id="arrowRose" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M1 1 L11 6 L1 11 Z" fill="#d78787"/>
    </marker>
